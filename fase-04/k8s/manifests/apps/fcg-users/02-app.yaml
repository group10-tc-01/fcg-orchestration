apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcg-users
  namespace: fcg-users
  labels:
    app.kubernetes.io/name: fcg-users
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fcg-users
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fcg-users
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: fcg-users
          image: fcg-users:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: fcg-users-local-config
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: fcg-users-local-secret
                  key: connection-string
            - name: JwtSettings__SecretKey
              valueFrom:
                secretKeyRef:
                  name: fcg-users-local-secret
                  key: jwt-secret-key
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: fcg-users-service
  namespace: fcg-users
  labels:
    app.kubernetes.io/name: fcg-users
    app.kubernetes.io/component: api
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: fcg-users
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30050
