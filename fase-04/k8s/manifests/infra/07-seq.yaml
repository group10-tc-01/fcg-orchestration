apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq
  namespace: fcg-infra
  labels:
    app.kubernetes.io/name: seq
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seq
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: seq
          image: datalust/seq:latest
          ports:
            - containerPort: 5341
              name: ingestion
            - containerPort: 80
              name: ui
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SEQ_FIRSTRUN_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: seq-local-secret
                  key: admin-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: seq-service
  namespace: fcg-infra
  labels:
    app.kubernetes.io/name: seq
    app.kubernetes.io/component: observability
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: seq
  ports:
    - name: ingestion
      port: 5341
      targetPort: 5341
      nodePort: 30341
    - name: ui
      port: 80
      targetPort: 80
      nodePort: 30342
