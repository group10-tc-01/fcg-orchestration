apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: fcg-infra
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/component: tooling
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kibana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kibana
        app.kubernetes.io/component: tooling
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:9.3.3
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch-service.fcg-infra.svc.cluster.local:9200
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kibana-service
  namespace: fcg-infra
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/component: tooling
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      nodePort: 30601
