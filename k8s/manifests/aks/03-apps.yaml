apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcg-users
  namespace: fcg-system
  labels:
    app.kubernetes.io/name: fcg-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fcg-users
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fcg-users
    spec:
      containers:
        - name: fcg-users
          image: fcgacrfiap2026.azurecr.io/fcg-users:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: kv-runtime-secrets
                  key: sql-connection-users
            - name: JwtSettings__SecretKey
              valueFrom:
                secretKeyRef:
                  name: kv-runtime-secrets
                  key: jwt-secret-key
            - name: KafkaSettings__BootstrapServers
              value: fcg-kafka.servicebus.windows.net:9093
            - name: KafkaSettings__SaslUsername
              value: "$ConnectionString"
            - name: KafkaSettings__SaslPassword
              valueFrom:
                secretKeyRef:
                  name: kv-runtime-secrets
                  key: eventhub-connection
            - name: KafkaSettings__UserCreatedTopic
              value: user-created
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-kv-fcg-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: fcg-users-service
  namespace: fcg-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fcg-users
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
